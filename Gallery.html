<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport"content="width=device-width,initial-scale=1"><title>Gallery-ELIDENS</title>
<link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
    
</head>
<body>
<header>
    <nav class="navbar content">
        <a href="#" class="nav-logo">
            <h2 class="logo-text">🕊 ELIDENS</h2>
        </a>
        <div class="menu-toggle" id="mobile-menu">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <ul class="nav-menu">
         <li class="nav-item"><a href="index.html" class="home">Home</a></li>
                <li class="nav-item"><a href="about.html" class="about">About</a></li>
                <li class="nav-item"><a href="Sections.html" class="sections">Sections</a></li>
                <li class="nav-item"><a href="admissions.html" class="admissions active">Admissions</a></li>
                <li class="nav-item"><a href="facilities.html" class="facilities">Facilities</a></li>
                <li class="nav-item"><a href="news.html" class="news">News</a></li>
                <li class="nav-item"><a href="Gallery.html" class="Gallery">Gallery</a></li>
                <li class="nav-item"><a href="Contact.html" class="contact">Contact</a></li>
                <li><a href="login.html" class="btn">Login</a></li>
        </ul>
    </nav>
</header>

<div class="gallery-container">
<div class="gallery-banner"><img src="images/g.png" alt="Gallery Banner" class="banner-image"></div>
<div class="gallery-title-section"><h1>📸 School Gallery</h1><p>Share memories and moments</p></div>
<div class="gallery-posts"id="dynamic-posts"></div>
</div>

<footer class="end"></footer>
<script>
const mobileMenu = document.getElementById('mobile-menu');
const navMenu = document.querySelector('.nav-menu');
if (mobileMenu) {
    mobileMenu.addEventListener('click', () => {
        mobileMenu.classList.toggle('active');
        navMenu.classList.toggle('active');
    });
}
</script>
<script type="module">
import { db, initAuth } from './js/firebase-config.js';
import { collection, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, getDocs, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getTimeAgo, getCurrentUserId, canInteract } from './js/utils.js';

let posts = [];
let currentUserId = null;
const loginModal = document.getElementById('loginModal');
const closeModalBtn = document.getElementById('closeModal');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');

// Init auth
initAuth((user) => {
  currentUserId = user ? user.uid : null;
  document.body.dataset.authenticated = user ? 'true' : 'false';
  updateAuthStatus(user);
  if (user) {
    closeModal();
  }
});

// Pre-fill stored email
const storedEmail = getStoredEmail();
if (storedEmail) {
  document.getElementById('loginEmail').value = storedEmail;
  document.getElementById('signupEmail').value = storedEmail;
}

// Modal controls
closeModalBtn.onclick = closeModal;
loginModal.onclick = (e) => { if (e.target === loginModal) closeModal(); };
function closeModal() { loginModal.classList.remove('show'); }

function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.login-form').forEach(form => form.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'login') {
    loginForm.classList.add('active');
    document.getElementById('modalTitle').textContent = 'Login to interact';
    document.getElementById('switchLink').innerHTML = '<span>or </span><a href="#" onclick="switchTab(\'signup\')">create account</a>';
  } else {
    signupForm.classList.add('active');
    document.getElementById('modalTitle').textContent = 'Create Account';
    document.getElementById('switchLink').innerHTML = '<span>or </span><a href="#" onclick="switchTab(\'login\')">login</a>';
  }
}

// Auth handlers
loginForm.onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const btn = e.target.querySelector('.login-submit');
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  const { success, error } = await login(email, password);
  if (!success) {
    document.getElementById('loginError').textContent = error;
    document.getElementById('loginError').style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Login';
};

signupForm.onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById('signupEmail').value;
  const name = document.getElementById('signupName').value;
  const password = document.getElementById('signupPassword').value;
  const btn = e.target.querySelector('.login-submit');
  btn.disabled = true;
  btn.textContent = 'Creating...';
  const { success, error } = await signup(email, password, name);
  if (!success) {
    document.getElementById('loginError').textContent = error;
    document.getElementById('loginError').style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Create Account';
};

window.logoutUser = async () => {
  const result = await logout();
  if (result.success) {
    console.log('Logged out');
  }
};

function updateAuthStatus(user) {
  const statusEl = document.getElementById('authStatus');
  if (statusEl) {
    if (user) {
      statusEl.textContent = `Hi, ${user.displayName || user.email}`;
      statusEl.className = 'auth-status';
      statusEl.onclick = logoutUser;
    } else {
      statusEl.textContent = 'Login';
      statusEl.className = 'auth-status login-required';
      statusEl.onclick = () => loginModal.classList.add('show');
    }
  }
  // Update all action buttons
  document.querySelectorAll('.action-btn.like, .action-btn.comment').forEach(btn => {
    if (!canInteract()) {
      btn.classList.add('disabled');
    } else {
      btn.classList.remove('disabled');
    }
  });
}

// Show login status
const authStatus = document.createElement('div');
authStatus.id = 'authStatus';
authStatus.className = 'auth-status login-required';
document.body.appendChild(authStatus);
const postsRef = collection(db, 'gallery-posts');
const postsQuery = query(postsRef, orderBy('createdAt', 'desc'));
const loadPosts = () => onSnapshot(postsQuery, s => { posts = []; s.forEach(d => posts.push({ id: d.id, ...d.data() })); displayPosts(); });
const displayPosts = () => {
	const c = document.getElementById('dynamic-posts');
	c.innerHTML = posts.length ? '' : '<p style="text-align:center;color:#6c7a92;padding:40px">No posts yet</p>';
	posts.forEach(p => {
		const el = document.createElement('div');
		el.className = 'post';
		el.setAttribute('data-post-id', p.id);
		const t = getTimeAgo(p.createdAt?.toDate?.() ?? new Date());
		const m = p.mediaType === 'image'
			? `<div class="post-media"><img src="${p.mediaUrl}" alt="Post" class="media-image"></div>`
			: p.mediaType === 'video'
				? `<div class="post-media video-post"><video controls class="media-video"><source src="${p.mediaUrl}" type="video/mp4"></video></div>`
				: '';
		const liked = p.likedBy?.includes(currentUser);
		const authorImg = 'images/gallery.avif';
		el.innerHTML = `
			<div class="post-header">
				<div class="post-author">
					<img src="${authorImg}" alt="Author" class="author-avatar">
					<div>
						<h3>${p.author || p.title || 'Unknown'}</h3>
						<span class="post-time">${t}</span>
					</div>
				</div>
			</div>
			<div class="post-content">
				<h4 class="post-title">${p.title || ''}</h4>
				<p>${p.content || ''}</p>
			</div>
			${m}
			<div class="post-stats">
				<span class="likes"><i class="fas fa-thumbs-up" style="color:#2aae2a"></i> ${p.likes || 0} Likes</span>
				<span class="comment-count" data-post-id="${p.id}">0 Comments</span>
			</div>
			<div class="post-actions">
<button class="action-btn like${liked ? ' liked' : ''}${!canInteract() ? ' disabled' : ''}" onclick="${canInteract() ? `toggleLike(this,'${p.id}')` : `showLoginModal()`}">${liked ? '<i class="fas fa-thumbs-up"></i> Liked' : '<i class="far fa-thumbs-up"></i> Like'}</button>
				<button class="action-btn comment${!canInteract() ? ' disabled' : ''}" onclick="${canInteract() ? `toggleCommentBox(this,'${p.id}')` : `showLoginModal()`}"><i class="far fa-comment"></i> ${canInteract() ? 'Comment' : 'Login to comment'}</button>
				<button class="action-btn"><i class="fas fa-share"></i> Share</button>
			</div>
			<div class="comments-section hidden" id="comments-${p.id}">
				<div class="comment-input-box">
					<input type="text" placeholder="Comment...">
					<button onclick="addComment(this,'${p.id}')"><i class="fas fa-paper-plane"></i></button>
				</div>
			</div>
		`;
		c.appendChild(el);
		loadCommentsForPost(p.id);
		loadLikesForPost(p.id);
	});
	console.debug('Loaded posts:', posts.length, posts.map(p => ({ id: p.id, title: p.title })));
};
const loadCommentsForPost = postId => {
	const q = query(collection(db, 'comments'), where('postId', '==', postId));
	onSnapshot(q, snapshot => {
		const section = document.getElementById(`comments-${postId}`);
		if (!section) return;
		// remove existing comments
		section.querySelectorAll('.comment').forEach(c => c.remove());
		// update count
		const count = snapshot.size;
		const counterEl = document.querySelector(`.comment-count[data-post-id="${postId}"]`);
		if (counterEl) counterEl.textContent = count + ' Comments';
		// render comments safely
		snapshot.forEach(docSnap => {
			const d = docSnap.data();
			const div = document.createElement('div');
			div.className = 'comment' + (d.flagged ? ' flagged-comment' : '');
			const content = document.createElement('div');
			content.className = 'comment-content';
			const h4 = document.createElement('h4');
			h4.textContent = d.userName || 'User';
			const p = document.createElement('p');
			p.textContent = d.text || '';
			const time = document.createElement('span');
			time.className = 'comment-time';
			time.textContent = getTimeAgo(d.timestamp?.toDate?.() ?? new Date());
			content.appendChild(h4);
			content.appendChild(p);
			content.appendChild(time);
			const actions = document.createElement('div');
			actions.className = 'comment-actions';
			const delBtn = document.createElement('button');
			delBtn.onclick = () => deleteComment(docSnap.id);
			delBtn.innerHTML = '<i class="fas fa-trash"></i>';
			const editBtn = document.createElement('button');
			editBtn.onclick = () => editComment(docSnap.id, d.text || '');
			editBtn.innerHTML = '<i class="fas fa-edit"></i>';
			const flagBtn = document.createElement('button');
			flagBtn.onclick = () => flagComment(docSnap.id);
			flagBtn.innerHTML = '<i class="fas fa-flag"></i>';
			actions.appendChild(delBtn);
			actions.appendChild(editBtn);
			actions.appendChild(flagBtn);
			div.appendChild(content);
			div.appendChild(actions);
			const inputBox = section.querySelector('.comment-input-box');
			section.insertBefore(div, inputBox);
		});
	});
};

const loadLikesForPost = postId => {
	onSnapshot(doc(db, 'gallery-posts', postId), docSnap => {
		if (!docSnap.exists()) return;
		const d = docSnap.data();
		const post = document.querySelector(`[data-post-id="${postId}"]`);
		if (!post) return;
		const likesEl = post.querySelector('.post-stats .likes');
		if (likesEl) likesEl.innerHTML = `<i class="fas fa-thumbs-up" style="color:#2aae2a"></i> ${d.likes || 0} Likes`;
		const btn = post.querySelector('.post-actions .action-btn');
		if (!btn) return;
if (currentUserId && d.likedBy?.includes(currentUserId)) {
			btn.classList.add('liked');
			btn.innerHTML = '<i class="fas fa-thumbs-up"></i> Liked';
		} else {
			btn.classList.remove('liked');
			btn.innerHTML = '<i class="far fa-thumbs-up"></i> Like';
		}
	});
};
window.toggleLike = async (btn, pid) => {
  if (!canInteract()) {
    showLoginModal();
    return;
  }
  try {
    const ref = doc(db, 'gallery-posts', pid);
    const snap = await getDoc(ref);
    const d = snap.data();
    const newLikes = d.likes || 0;
    const newLiked = [...(d.likedBy || [])];
    if (newLiked.includes(currentUserId)) {
      newLiked.splice(newLiked.indexOf(currentUserId), 1);
      await updateDoc(ref, { likes: newLikes - 1, likedBy: newLiked });
    } else {
      newLiked.push(currentUserId);
      await updateDoc(ref, { likes: newLikes + 1, likedBy: newLiked });
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
};

window.showLoginModal = () => {
  loginModal.classList.add('show');
  document.getElementById('loginError').style.display = 'none';
};
window.toggleCommentBox=(btn,pid)=>document.getElementById(`comments-${pid}`).classList.toggle('hidden');
window.addComment = async (btn, pid) => {
  if (!canInteract()) {
    showLoginModal();
    return;
  }
  const input = btn.previousElementSibling;
  const text = input.value.trim();
  if (!text) return alert('Type a comment');
  try {
    await setDoc(doc(collection(db, 'comments')), {
      postId: pid,
      userName: auth.currentUser.displayName || auth.currentUser.email || 'User',
      userId: currentUserId,
      text,
      flagged: false,
      timestamp: serverTimestamp()
    });
    input.value = '';
  } catch (e) {
    alert('Error: ' + e.message);
  }
};
window.deleteComment = async (cid) => {
  if (!canInteract()) return showLoginModal();
  if (confirm('Delete your comment?')) {
    await deleteDoc(doc(db, 'comments', cid));
  }
};

window.editComment = async (cid, text) => {
  if (!canInteract()) return showLoginModal();
  const newText = prompt('Edit comment:', text);
  if (newText && newText.trim() && newText !== text) {
    await updateDoc(doc(db, 'comments', cid), {
      text: newText.trim(),
      edited: true,
      editedAt: serverTimestamp()
    });
  }
};

window.flagComment = async (cid) => {
  if (!canInteract()) return showLoginModal();
  const ref = doc(db, 'comments', cid);
  const snap = await getDoc(ref);
  const flagged = snap.data().flagged;
  await updateDoc(ref, { flagged: !flagged });
};

loadPosts();
</script>
</body>
</html>
