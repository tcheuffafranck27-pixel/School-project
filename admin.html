<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport"content="width=device-width,initial-scale=1"><title>Admin-ELIDENS</title>
<link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header>
    <nav class="navbar content">
        <a href="#" class="nav-logo">
            <h2 class="logo-text">🕊 ELIDENS</h2>
        </a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html">Home</a></li>
            <li class="nav-item"><a href="about.html">About</a></li>
            <li class="nav-item"><a href="Sections.html">Sections</a></li>
            <li class="nav-item"><a href="admissions.html" class="admissions">Admissions</a></li>
            <li class="nav-item"><a href="facilities.html" class="facilities">Facilities</a></li>
            <li class="nav-item"><a href="Gallery.html">Gallery</a></li>
            <li class="nav-item"><a href="news.html">News</a></li>
            <li class="nav-item"><a href="Contact.html">Contact</a></li>
            <li class="nav-item"><a href="admin.html" class="active">Login/Admin</a></li>
        </ul>
        <div id="authStatus" class="auth-status login-required">Login</div>
    </nav>
</header>

<div class="admin-container">
<h1>🔐 Admin Dashboard</h1>
<div class="admin-section">
<h2>➕ Create New Post</h2>
<form id="createPostForm"class="create-post-form">
<div class="form-group"><label for="postTitle">Post Title:</label><input type="text"id="postTitle"placeholder="e.g., School Events"required></div>
<div class="form-group"><label for="postContent">Post Description:</label><textarea id="postContent"placeholder="Write description..."rows="4"required></textarea></div>
<div class="form-group"><label for="mediaType">Media Type:</label>
<select id="mediaType"onchange="toggleMediaInput()">
<option value="none">No Media</option>
<option value="image">Image</option>
<option value="video">Video</option>
</select></div>
<div id="imageInputGroup" class="form-group hidden">
	<label for="mediaImage">Select Image File:</label>
	<input type="file" id="mediaImage" accept="image/*">
</div>
<div id="videoInputGroup" class="form-group hidden">
	<label for="mediaVideo">Select Video File:</label>
	<input type="file" id="mediaVideo" accept="video/*">
</div>
<div class="form-group"><label for="authorName">Author/Category:</label><input type="text"id="authorName"placeholder="e.g., School Events"required></div>
<button type="submit"class="btn btn-create"><i class="fas fa-plus"></i>Create Post</button>
</form></div>

<div class="admin-section">
<h2>📝 All Comments</h2>
<div class="tabs">
<button class="tab-btn active" onclick="filterComments('all', event)">All Comments</button>
<button class="tab-btn" onclick="filterComments('flagged', event)">🚩 Flagged</button>
</div>
<div id="comments-list"class="comments-admin-list"></div>
</div>

<div class="admin-section">
<h2>📸 Gallery Posts</h2>
<div id="gallery-posts-list"class="gallery-posts-admin"></div>
</div>
<div class="admin-section">
<h2>📰 News Posts</h2>
<div id="news-posts-list"class="news-posts-admin"></div>
<button class="btn btn-create" onclick="showCreateNewsForm()">➕ Create New News</button>
<form id="createNewsForm"class="create-post-form" style="display:none;">
    <div class="form-group"><label for="newsTitle">News Title:</label><input type="text"id="newsTitle"required></div>
    <div class="form-group"><label for="newsContent">News Content:</label><textarea id="newsContent"rows="6"required></textarea></div>
    <div class="form-group"><label for="newsImage">Featured Image:</label><input type="file"id="newsImage"accept="image/*"></div>
    <div class="form-group"><label for="newsAuthor">Author:</label><input type="text"id="newsAuthor"placeholder="Admin / School News"></div>
    <button type="submit"class="btn btn-create">Publish News</button>
    <button type="button"class="btn btn-secondary"onclick="hideCreateNewsForm()">Cancel</button>
</form>
</div>
</div>

<footer class="end"></footer>
<script type="module">
import { db, initAuth, auth, canInteract } from './js/firebase-config.js';
import { collection, doc, getDocs, deleteDoc, updateDoc, setDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getStoredEmail, getTimeAgo, fileToDataURL } from './js/utils.js';

initAuth(() => {
  const container = document.querySelector('.admin-container');
  const statusEl = document.getElementById('authStatus');
  if (!canInteract()) {
    // Show login page UI
    container.innerHTML = `
      <div class="login-page">
        <div class="login-modal-content">
          <div class="login-modal-header">
            <h2>Login to ELIDENS Admin</h2>
            <p>Access admin dashboard or create account</p>
          </div>
          <div id="loginError" class="login-error"></div>
          <div class="login-tabs">
            <button class="login-tab active" id="loginTabBtn">Login</button>
            <button class="login-tab" id="signupTabBtn">Sign Up</button>
          </div>
          <form class="login-form active" id="loginForm">
            <div class="login-form-group">
              <label>Email</label>
              <input type="email" id="loginEmail" required>
            </div>
            <div class="login-form-group">
              <label>Password</label>
              <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="login-submit">Log In</button>
          </form>
          <form class="login-form" id="signupForm">
            <div class="login-form-group">
              <label>Email</label>
              <input type="email" id="signupEmail" required>
            </div>
            <div class="login-form-group">
              <label>Display Name</label>
              <input type="text" id="signupName" required>
            </div>
            <div class="login-form-group">
              <label>Password</label>
              <input type="password" id="signupPassword" required>
            </div>
            <button type="submit" class="login-submit">Create Account</button>
          </form>
          <div class="login-switch" id="switchLink">
            <span>or </span><a href="#" id="switchSignup">create account</a>
          </div>
        </div>
      </div>`;
    
    statusEl.textContent = 'Login';
    statusEl.className = 'auth-status login-required';
    statusEl.style.display = 'none'; // Hide on login page
    
    // Setup login handlers
    setupLoginHandlers();
    
    // Pre-fill stored email
    const storedEmail = getStoredEmail();
    if (storedEmail) {
      document.getElementById('loginEmail').value = storedEmail;
      document.getElementById('signupEmail').value = storedEmail;
    }
  } else {
    // Show dashboard and setup status
    statusEl.textContent = \`Hi, \${auth.currentUser.displayName || auth.currentUser.email}\`;
    statusEl.className = 'auth-status';
    statusEl.onclick = async () => await auth.signOut();
  }
});

let allComments = [];
let currentFilter = 'all';

const loadAllComments = () => onSnapshot(collection(db, 'comments'), snapshot => {
	allComments = [];
	snapshot.forEach(d => allComments.push({ id: d.id, ...d.data() }));
	displayComments();
});

function displayComments() {
	const c = document.getElementById('comments-list');
	c.innerHTML = '';
	const f = currentFilter === 'flagged' ? allComments.filter(cm => cm.flagged) : allComments;
	if (f.length === 0) {
		c.innerHTML = '<p class="no-data">No comments found</p>';
		return;
	}
	f.forEach(cm => {
		const div = document.createElement('div');
		div.className = 'comment-admin' + (cm.flagged ? ' flagged' : '');
		div.innerHTML = `<div class="comment-admin-header"><h4>${cm.userName}</h4><span class="post-label">${cm.postId}</span>${cm.flagged ? '<span class="flag-badge">🚩 Flagged</span>' : ''}</div><p class="comment-text">${cm.text}</p><div class="comment-admin-actions">${!cm.flagged ? `<button class="btn btn-flag" onclick="flagComment('${cm.id}')"><i class="fas fa-flag"></i>Flag</button>` : `<button class="btn btn-unflag" onclick="unflagComment('${cm.id}')"><i class="fas fa-check"></i>Unflag</button>`}<button class="btn btn-delete" onclick="deleteCommentAdmin('${cm.id}')"><i class="fas fa-trash"></i>Delete</button></div>`;
		c.appendChild(div);
	});
}

const loadGalleryPosts = () => onSnapshot(collection(db, 'gallery-posts'), async snapshot => {
	const c = document.getElementById('gallery-posts-list');
	c.innerHTML = '';
	if (snapshot.empty) {
		c.innerHTML = '<p class="no-data">No posts yet</p>';
		return;
	}
	await Promise.all(snapshot.docs.map(async d => {
		const data = d.data();
		const cnt = await getDocs(query(collection(db, 'comments'), where('postId', '==', d.id)));
		const div = document.createElement('div');
		div.className = 'post-admin';
		const cr = data.createdAt?.toDate?.() ?? new Date();
		div.innerHTML = `<div class="post-admin-header"><h3>${data.title}</h3><span class="date-badge">${cr.toLocaleDateString()}</span></div><p class="post-author">By: ${data.author}</p><p class="post-description">${data.content}</p>${data.mediaUrl ? `<p class="media-info">📎 ${data.mediaType.toUpperCase()}</p>` : ''}<div class="post-stats-admin"><span>👍 ${data.likes || 0} Likes</span><span>💬 ${cnt.size} Comment${cnt.size !== 1 ? 's' : ''}</span></div><div class="post-admin-actions"><button class="btn btn-delete" onclick="deletePost('${d.id}')"><i class="fas fa-trash"></i>Delete</button></div>`;
		c.appendChild(div);
	}));
});

window.toggleMediaInput = () => {
	const m = document.getElementById('mediaType').value;
	document.getElementById('imageInputGroup').classList.toggle('hidden', m !== 'image');
	document.getElementById('videoInputGroup').classList.toggle('hidden', m !== 'video');
};

window.filterComments = (f, ev) => {
	currentFilter = f;
	document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
	const target = ev?.target || null;
	if (target) target.classList.add('active');
	displayComments();
};

window.flagComment = async cid => {
	try {
		await updateDoc(doc(db, 'comments', cid), { flagged: true, flaggedAt: new Date() });
		alert('Comment flagged');
	} catch (e) {
		alert('Error: ' + e.message);
	}
};

window.unflagComment = async cid => {
	try {
		await updateDoc(doc(db, 'comments', cid), { flagged: false });
		alert('Comment unflagged');
	} catch (e) {
		alert('Error: ' + e.message);
	}
};

window.deleteCommentAdmin = async cid => {
	if (!confirm('Delete this comment?')) return;
	try {
		await deleteDoc(doc(db, 'comments', cid));
		alert('Deleted');
	} catch (e) {
		alert('Error: ' + e.message);
	}
};

window.deletePost = async pid => {
	if (!confirm('Delete post and comments?')) return;
	try {
		await deleteDoc(doc(db, 'gallery-posts', pid));
		const q = query(collection(db, 'comments'), where('postId', '==', pid));
		(await getDocs(q)).docs.forEach(d => deleteDoc(d.ref));
		alert('Post deleted');
	} catch (e) {
		alert('Error: ' + e.message);
	}
};

document.getElementById('createPostForm').addEventListener('submit', async e => {
	e.preventDefault();
	const title = document.getElementById('postTitle').value;
	const content = document.getElementById('postContent').value;
	const mediaType = document.getElementById('mediaType').value;
	const author = document.getElementById('authorName').value;
	let mediaUrl = null;
	try {
		if (mediaType === 'image' && document.getElementById('mediaImage').files[0])
			mediaUrl = await fileToDataURL(document.getElementById('mediaImage').files[0]);
		if (mediaType === 'video' && document.getElementById('mediaVideo').files[0])
			mediaUrl = await fileToDataURL(document.getElementById('mediaVideo').files[0]);
		const id = 'post_' + Date.now();
		await setDoc(doc(db, 'gallery-posts', id), { id, title, content, author, mediaType, mediaUrl, likes: 0, likedBy: [], createdAt: serverTimestamp() });
		alert('✅ Post created!');
		document.getElementById('createPostForm').reset();
		document.getElementById('imageInputGroup').classList.add('hidden');
		document.getElementById('videoInputGroup').classList.add('hidden');
	} catch (err) {
		alert('❌ Error: ' + err.message);
		console.error(err);
	}
});

loadAllComments();
loadGalleryPosts();

// News Posts Management
const loadNewsPosts = () => onSnapshot(collection(db, 'news-posts'), async snapshot => {
    const c = document.getElementById('news-posts-list');
    c.innerHTML = '';
    if (snapshot.empty) {
        c.innerHTML = '<p class="no-data">No news posts yet</p>';
        return;
    }
    snapshot.docs.forEach(d => {
        const data = d.data();
        const cr = data.createdAt?.toDate?.() ?? new Date();
        const div = document.createElement('div');
        div.className = 'post-admin';
        div.innerHTML = `
            <div class="post-admin-header">
                <h3>${data.title}</h3>
                <span class="date-badge">${cr.toLocaleDateString()}</span>
            </div>
            <p class="post-author">By: ${data.author || 'Admin'}</p>
            <p class="post-description">${data.content.substring(0, 100)}...</p>
            ${data.imageUrl ? `<p class="media-info">🖼️ Featured Image</p>` : ''}
            <div class="post-admin-actions">
                <button class="btn btn-delete" onclick="deleteNewsPost('${d.id}')"><i class="fas fa-trash"></i> Delete</button>
            </div>`;
        c.appendChild(div);
    });
});

window.showCreateNewsForm = () => {
    document.getElementById('createNewsForm').style.display = 'block';
};

window.hideCreateNewsForm = () => {
    document.getElementById('createNewsForm').style.display = 'none';
    document.getElementById('createNewsForm').reset();
};

window.deleteNewsPost = async (pid) => {
    if (!confirm('Delete this news post?')) return;
    try {
        await deleteDoc(doc(db, 'news-posts', pid));
        alert('News post deleted');
    } catch (e) {
        alert('Error: ' + e.message);
    }
};

document.getElementById('createNewsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('newsTitle').value;
    const content = document.getElementById('newsContent').value;
    const imageFile = document.getElementById('newsImage').files[0];
    const author = document.getElementById('newsAuthor').value || 'Admin';
    let imageUrl = '';
    
    try {
        if (imageFile) {
            imageUrl = await fileToDataURL(imageFile);
        }
        const id = 'news_' + Date.now();
        await setDoc(doc(db, 'news-posts', id), {
            id,
            title,
            content,
            author,
            imageUrl,
            createdAt: serverTimestamp()
        });
        alert('✅ News post published!');
        hideCreateNewsForm();
    } catch (err) {
        alert('❌ Error: ' + err.message);
    }
});

loadNewsPosts();
</script>
</body>
</html>
