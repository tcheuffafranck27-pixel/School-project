    <!-- Global Auth Script -->
    <script type="module">
        import { initAuth, auth } from './js/firebase-config.js';
        import { getStoredEmail } from './js/utils.js';
        
        // Global functions (shared with index.html)
        window.showLoginModal = () => document.getElementById('loginModal')?.classList.add('show');
        window.closeModal = () => document.getElementById('loginModal')?.classList.remove('show');
        
        document.addEventListener('DOMContentLoaded', () => {
            initAuth((user) => {
                const statusEl = document.getElementById('authStatus');
                if (statusEl) {
                    if (user) {
                        statusEl.textContent = `Hi, ${user.displayName || user.email}`;
                        statusEl.className = 'auth-status';
                        statusEl.onclick = async () => await auth.signOut();
                    } else {
                        statusEl.textContent = 'Login';
                        statusEl.className = 'auth-status login-required';
                        statusEl.onclick = showLoginModal;
                    }
                }
            });
            
            const storedEmail = getStoredEmail();
            if (storedEmail) {
                const loginEmail = document.getElementById('loginEmail');
                const signupEmail = document.getElementById('signupEmail');
                if (loginEmail) loginEmail.value = storedEmail;
                if (signupEmail) signupEmail.value = storedEmail;
            }
            
            // Modal handlers
            document.getElementById('closeModal')?.onclick = closeModal;
            document.getElementById('loginModal')?.onclick = (e) => {
                if (e.target === document.getElementById('loginModal')) closeModal();
            };
            
            document.getElementById('loginForm')?.onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const btn = e.target.querySelector('.login-submit');
                btn.disabled = true;
                btn.textContent = 'Logging in...';
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    closeModal();
                } catch (error) {
                    document.getElementById('loginError').textContent = error.message;
                    document.getElementById('loginError').classList.add('show');
                }
                btn.disabled = false;
                btn.textContent = 'Log In';
            };
            
            document.getElementById('signupForm')?.onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('signupEmail').value;
                const name = document.getElementById('signupName').value;
                const password = document.getElementById('signupPassword').value;
                const btn = e.target.querySelector('.login-submit');
                btn.disabled = true;
                btn.textContent = 'Creating...';
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    await userCredential.user.updateProfile({ displayName: name });
                    closeModal();
                } catch (error) {
                    document.getElementById('loginError').textContent = error.message;
                    document.getElementById('loginError').classList.add('show');
                }
                btn.disabled = false;
                btn.textContent = 'Create Account';
            };
        });
        
        // Define switchTab if not defined
        window.switchTab = window.switchTab || ((tab) => {
            document.querySelectorAll('.login-tab').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(form => form.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('modalTitle').textContent = 'Login to ELIDENS';
                document.getElementById('switchLink').innerHTML = '<span>or </span><a href="#" onclick="switchTab(\'signup\')">create account</a>';
            } else {
                document.getElementById('signupForm').classList.add('active');
                document.getElementById('modalTitle').textContent = 'Create Account';
                document.getElementById('switchLink').innerHTML = '<span>or </span><a href="#" onclick="switchTab(\'login\')">login</a>';
            }
        });
    </script>
    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navMenu = document.querySelector('.nav-menu');
        if (mobileMenu) {
            mobileMenu.addEventListener('click', () => {
                mobileMenu.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }
    </script>
    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, getDocs, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getTimeAgo, createUser } from './js/utils.js';
        const currentUser = createUser();
        let posts = [];
        const postsRef = collection(db, 'news-posts');
        const postsQuery = query(postsRef, orderBy('createdAt', 'desc'));
        const loadPosts = () => onSnapshot(postsQuery, s => { 
            posts = []; 
            s.forEach(d => posts.push({ id: d.id, ...d.data() })); 
            displayPosts(); 
        });
        const displayPosts = () => {
            const c = document.getElementById('dynamic-news');
            c.innerHTML = posts.length ? '' : '<p style="text-align:center;color:#6c7a92;padding:40px">No news posts yet. Check back soon!</p>';
            posts.forEach(p => {
                const el = document.createElement('div');
                el.className = 'news-post';
                el.setAttribute('data-post-id', p.id);
                const t = getTimeAgo(p.createdAt?.toDate?.() || new Date());
                el.innerHTML = `
                    <div class="news-header">
                        <h3>${p.title}</h3>
                        <span class="news-date">${t}</span>
                    </div>
                    <div class="news-content">
                        <p>${p.content}</p>
                    </div>
                `;
                c.appendChild(el);
            });
        };
        loadPosts();
    </script>
